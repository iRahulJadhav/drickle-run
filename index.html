<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Drickle Run — Café Cat Runner</title>

<!-- Open Graph / Link Preview -->
<meta property="og:title" content="Drickle Run — Café Cat Runner">
<meta property="og:description" content="Help the café cat jump over Drickle coffee cups and collect cookies & burgers! A fun game to play while you wait for your coffee.">

<meta name="twitter:title" content="Drickle Run — Café Cat Runner">
<meta name="twitter:description" content="Help the café cat jump over Drickle coffee cups and collect treats!">
<meta name="twitter:image" content="https://irahuljadhav.github.io/drickle-run/Drickle%20Run%20banner.png">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #fefe20;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  #gameContainer {
    position: relative;
    width: 100vw;
    max-width: 700px;
    aspect-ratio: 1/1;
    max-height: 100vh;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
</div>
<img id="bottomBg" src="Bottom Background.jpg" alt="" style="width:80vw;max-width:560px;display:block;margin-top:-13%;">
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 600;
const H = 600;
canvas.width = W;
canvas.height = H;

const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let hiScore = parseInt(localStorage.getItem('drickleHiScore') || '0');
let gameSpeed = 6;
let frameCount = 0;
let lives = 3;
let invincibleTimer = 0;

// Show FULL background at correct aspect ratio (no cropping).
// bg is ~1.83:1 ratio, so at W=600 it'll be ~328px tall.
// The table strip overlays the bg's own counter at the bottom of the bg.
const tableStripH = 55;
// Table overlays bg counter at ~72% of canvas height
const tableTopY = Math.floor(H * 0.72);
// Cat stands on the table surface
let groundY = tableTopY + 10;

function loadImg(src) {
  const img = new Image();
  img.src = src;
  return img;
}

const bgImg = loadImg('Drickle Run Cafe Square Background.png');
const catSheet = loadImg('Run Cycle.png');
const cupImg = loadImg('Drickle Run Coffee Glass.png');
const burgerImg = loadImg('Drickle Run Burger.png');
const cookieImg = loadImg('Drickle Run Cookie.png');
const tableImg = loadImg('Drickle Run Table.png');

let allLoaded = false;
let loadCount = 0;
[bgImg, catSheet, cupImg, burgerImg, cookieImg, tableImg].forEach(img => {
  img.onload = () => { loadCount++; if (loadCount >= 6) allLoaded = true; };
});

const cat = {
  x: 60,
  y: 0,
  w: 120,
  h: 100,
  vy: 0,
  jumping: false,
  frame: 0,
  frameTimer: 0,
  frameSpeed: 4,
};
cat.y = groundY - cat.h;

const GRAVITY = 0.6;
const JUMP_FORCE_MIN = -13;
const JUMP_FORCE_MAX = -17;
const JUMP_HOLD_TIME = 12;

let jumpHeld = false;
let jumpHoldCounter = 0;

let obstacles = [];
let nextObstacleIn = 100;

let collectibles = [];
let nextCollectibleIn = 60;

let counterOffset = 0;
let particles = [];
let scorePopups = [];

function resetGame() {
  score = 0;
  gameSpeed = 6;
  lives = 3;
  invincibleTimer = 0;
  cat.y = groundY - cat.h;
  cat.vy = 0;
  cat.jumping = false;
  cat.frame = 0;
  jumpHeld = false;
  jumpHoldCounter = 0;
  obstacles = [];
  collectibles = [];
  particles = [];
  scorePopups = [];
  nextObstacleIn = 100;
  nextCollectibleIn = 60;
  frameCount = 0;
  counterOffset = 0;
}

function startJump() {
  if (state === STATE.MENU) {
    state = STATE.PLAYING;
    resetGame();
    return;
  }
  if (state === STATE.GAMEOVER) {
    state = STATE.MENU;
    return;
  }
  if (!cat.jumping) {
    cat.vy = JUMP_FORCE_MIN;
    cat.jumping = true;
    jumpHeld = true;
    jumpHoldCounter = 0;
  }
}

function releaseJump() {
  jumpHeld = false;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!e.repeat) startJump();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') releaseJump();
});
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startJump(); });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); releaseJump(); });
canvas.addEventListener('mousedown', (e) => { e.preventDefault(); startJump(); });
canvas.addEventListener('mouseup', (e) => { e.preventDefault(); releaseJump(); });

function spawnObstacle() {
  const rand = Math.random();
  // Cup aspect ratio ~0.76 (width/height) based on new coffee glass image
  if (rand < 0.25) {
    const cupH = 85 + Math.random() * 12;
    const cupW = Math.floor(cupH * 0.76);
    obstacles.push({ x: W + 20, y: groundY - cupH - 15, w: cupW, h: cupH });
  } else if (rand < 0.5) {
    const cupH1 = 65 + Math.random() * 10;
    const cupW1 = Math.floor(cupH1 * 0.76);
    const cupH2 = 65 + Math.random() * 10;
    const cupW2 = Math.floor(cupH2 * 0.76);
    obstacles.push({ x: W + 20, y: groundY - cupH1 - 15, w: cupW1, h: cupH1 });
    obstacles.push({ x: W + 20 + cupW1 + 8, y: groundY - cupH2 - 15, w: cupW2, h: cupH2 });
  } else if (rand < 0.65) {
    const cupH = 52 + Math.random() * 8;
    const cupW = Math.floor(cupH * 0.76);
    obstacles.push({ x: W + 20, y: groundY - cupH - 15, w: cupW, h: cupH });
  } else {
    const cupH = 65 + Math.random() * 10;
    const cupW = Math.floor(cupH * 0.76);
    obstacles.push({ x: W + 20, y: groundY - cupH - 15, w: cupW, h: cupH });
  }
}

function spawnCollectible() {
  const type = Math.random() < 0.5 ? 'cookie' : 'burger';
  const minY = groundY - 220;
  const maxY = groundY - 140;
  // Cookie is round, burger is roughly square
  const w = type === 'cookie' ? 44 : 48;
  const h = type === 'cookie' ? 44 : 42;
  collectibles.push({
    x: W + 20,
    y: minY + Math.random() * (maxY - minY),
    w: w,
    h: h,
    type: type,
  });
}

function hitTest(a, b, shrink) {
  const s = shrink || 8;
  return a.x + s < b.x + b.w - s &&
         a.x + a.w - s > b.x + s &&
         a.y + s < b.y + b.h - s &&
         a.y + a.h - s > b.y + s;
}

function addParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5 - 2,
      life: 25,
      color: color,
      size: 2 + Math.random() * 4,
    });
  }
}

function addScorePopup(x, y, text) {
  scorePopups.push({ x, y, text, life: 40, vy: -1.5 });
}

function update() {
  if (state !== STATE.PLAYING) return;

  frameCount++;

  if (frameCount % 300 === 0 && gameSpeed < 14) gameSpeed += 0.4;
  if (frameCount % 6 === 0) score++;
  if (invincibleTimer > 0) invincibleTimer--;

  if (jumpHeld && cat.jumping && jumpHoldCounter < JUMP_HOLD_TIME) {
    jumpHoldCounter++;
    cat.vy += (JUMP_FORCE_MAX - JUMP_FORCE_MIN) / JUMP_HOLD_TIME;
  }

  cat.vy += GRAVITY;
  cat.y += cat.vy;
  if (cat.y >= groundY - cat.h) {
    cat.y = groundY - cat.h;
    cat.vy = 0;
    cat.jumping = false;
    jumpHeld = false;
    jumpHoldCounter = 0;
  }

  cat.frameTimer++;
  if (cat.frameTimer >= cat.frameSpeed) {
    cat.frameTimer = 0;
    cat.frame = (cat.frame + 1) % 8;
  }

  counterOffset = (counterOffset + gameSpeed) % 200;

  nextObstacleIn -= gameSpeed / 4;
  if (nextObstacleIn <= 0) {
    spawnObstacle();
    nextObstacleIn = (200 + Math.random() * 140) / (gameSpeed / 4);
  }

  nextCollectibleIn -= gameSpeed / 4;
  if (nextCollectibleIn <= 0) {
    spawnCollectible();
    nextCollectibleIn = 50 + Math.random() * 80;
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= gameSpeed;
    if (obstacles[i].x + obstacles[i].w < -20) { obstacles.splice(i, 1); continue; }
    if (invincibleTimer <= 0 && hitTest(cat, obstacles[i], 12)) {
      lives--;
      addParticles(cat.x + cat.w / 2, cat.y + cat.h / 2, '#ff6644');
      if (lives <= 0) {
        state = STATE.GAMEOVER;
        if (score > hiScore) { hiScore = score; localStorage.setItem('drickleHiScore', hiScore.toString()); }
      } else {
        invincibleTimer = 90;
        obstacles.splice(i, 1);
      }
    }
  }

  for (let i = collectibles.length - 1; i >= 0; i--) {
    collectibles[i].x -= gameSpeed;
    if (collectibles[i].x + collectibles[i].w < -20) { collectibles.splice(i, 1); continue; }
    if (hitTest(cat, collectibles[i], 2)) {
      const pts = collectibles[i].type === 'cookie' ? 15 : 10;
      score += pts;
      addParticles(collectibles[i].x + 20, collectibles[i].y + 20, collectibles[i].type === 'cookie' ? '#c08040' : '#f0a030');
      addScorePopup(collectibles[i].x, collectibles[i].y - 10, '+' + pts);
      collectibles.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].x += particles[i].vx;
    particles[i].y += particles[i].vy;
    particles[i].life--;
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y += scorePopups[i].vy;
    scorePopups[i].life--;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}

// ─── DRAWING ───

function drawBackground() {
  if (bgImg.complete) {
    // Draw full square image to fill full square canvas — no cropping
    ctx.drawImage(bgImg, 0, 0, bgImg.naturalWidth, bgImg.naturalHeight, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#fefe20';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawTable() {
  // Place table strip right over the bg's counter (bottom ~15% of bg image)
  const tableY = tableTopY;

  if (tableImg.complete) {
    const imgW = tableImg.naturalWidth;
    const imgH = tableImg.naturalHeight;
    const scale = tableStripH / imgH;
    const drawW = imgW * scale;
    const offset = -(counterOffset % drawW);
    for (let x = offset; x < W; x += drawW) {
      ctx.drawImage(tableImg, x, tableY, drawW, tableStripH);
    }
  } else {
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, tableY, W, tableStripH);
  }
}

function drawCat() {
  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 3) % 2 === 0) return;
  if (!catSheet.complete) return;

  const cols = 8;
  const sw = catSheet.width / cols;
  const sh = catSheet.height;
  const frameIdx = cat.jumping ? 5 : cat.frame % 8;

  ctx.drawImage(catSheet, frameIdx * sw, 0, sw, sh, cat.x, cat.y, cat.w, cat.h);
}

function drawObstacles() {
  for (const obs of obstacles) {
    if (!cupImg.complete) continue;
    ctx.drawImage(cupImg, obs.x, obs.y, obs.w, obs.h);
  }
}

function drawCollectibles() {
  for (const col of collectibles) {
    const img = col.type === 'cookie' ? cookieImg : burgerImg;
    if (!img.complete) continue;
    const floatY = Math.sin(frameCount * 0.08 + col.x * 0.01) * 4;
    ctx.drawImage(img, col.x, col.y + floatY, col.w, col.h);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / 25;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawScorePopups() {
  for (const sp of scorePopups) {
    ctx.globalAlpha = sp.life / 40;
    ctx.font = 'bold 14px "Press Start 2P", monospace';
    ctx.fillStyle = '#ffd700';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.textAlign = 'center';
    ctx.strokeText(sp.text, sp.x, sp.y);
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 65);

  ctx.textAlign = 'right';
  ctx.font = '15px "Press Start 2P", monospace';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.strokeText('SCORE: ' + String(score).padStart(5, '0'), W - 15, 28);
  ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), W - 15, 28);

  ctx.font = '11px "Press Start 2P", monospace';
  ctx.fillStyle = '#ccc';
  ctx.strokeText('HI: ' + String(hiScore).padStart(5, '0'), W - 15, 50);
  ctx.fillText('HI: ' + String(hiScore).padStart(5, '0'), W - 15, 50);

  // Lives bar — just below the table strip
  const livesBarY = tableTopY + tableStripH - 2;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, livesBarY, W, 36);

  ctx.font = '12px "Press Start 2P", monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText('LIVES:', 15, livesBarY + 24);
  ctx.fillText('LIVES:', 15, livesBarY + 24);

  if (catSheet.complete) {
    const sw = catSheet.width / 8;
    const sh = catSheet.height;
    for (let i = 0; i < lives; i++) {
      ctx.drawImage(catSheet, 0, 0, sw, sh, 110 + i * 38, livesBarY + 4, 36, 25);
    }
  }
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';

  const cy = H * 0.28;

  ctx.font = 'bold 44px "Press Start 2P", monospace';
  ctx.lineWidth = 6;
  ctx.fillStyle = '#ffd700';
  ctx.strokeText('DRICKLE', W / 2, cy - 80);
  ctx.fillText('DRICKLE', W / 2, cy - 80);
  ctx.strokeText('RUN', W / 2, cy - 28);
  ctx.fillText('RUN', W / 2, cy - 28);


  if (catSheet.complete) {
    const sw = catSheet.width / 8;
    const sh = catSheet.height;
    const menuFrame = Math.floor(Date.now() / 150) % 8;
    ctx.drawImage(catSheet, sw * menuFrame, 0, sw, sh, W / 2 - 60, cy + 10, 120, 84);
  }

  const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.font = '22px "Press Start 2P", monospace';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.strokeText('TAP TO START', W / 2, cy + 120);
  ctx.fillText('TAP TO START', W / 2, cy + 120);
  ctx.globalAlpha = 1;

  ctx.font = '14px "Press Start 2P", monospace';
  ctx.fillStyle = '#ffd700';
  ctx.lineWidth = 3;
  ctx.strokeText('LONG PRESS = JUMP HIGHER!', W / 2, cy + 148);
  ctx.fillText('LONG PRESS = JUMP HIGHER!', W / 2, cy + 148);

  // Game rules — prominent box
  const boxY = cy + 165;
  const boxH = 145;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(30, boxY, W - 60, boxH, 12);
  ctx.fill();
  ctx.stroke();

  ctx.font = '14px "Press Start 2P", monospace';
  ctx.fillStyle = '#ff6666';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText('You lose a life when', W / 2, boxY + 28);
  ctx.fillText('You lose a life when', W / 2, boxY + 28);
  ctx.strokeText('you spill a Drickle cup!', W / 2, boxY + 50);
  ctx.fillText('you spill a Drickle cup!', W / 2, boxY + 50);

  ctx.fillStyle = '#44ff44';
  ctx.strokeText('Earn extra points by', W / 2, boxY + 82);
  ctx.fillText('Earn extra points by', W / 2, boxY + 82);
  ctx.strokeText('collecting Cookies', W / 2, boxY + 104);
  ctx.fillText('collecting Cookies', W / 2, boxY + 104);
  ctx.strokeText('& Burgers!', W / 2, boxY + 126);
  ctx.fillText('& Burgers!', W / 2, boxY + 126);


  if (hiScore > 0) {
    ctx.font = '18px "Press Start 2P", monospace';
    ctx.fillStyle = '#ffd700';
    ctx.strokeText('BEST: ' + String(hiScore).padStart(5, '0'), W / 2, boxY + boxH + 30);
    ctx.fillText('BEST: ' + String(hiScore).padStart(5, '0'), W / 2, boxY + boxH + 30);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  const cy = H * 0.4;
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;

  ctx.font = 'bold 32px "Press Start 2P", monospace';
  ctx.fillStyle = '#ff4444';
  ctx.strokeText('GAME OVER', W / 2, cy);
  ctx.fillText('GAME OVER', W / 2, cy);

  ctx.font = '18px "Press Start 2P", monospace';
  ctx.fillStyle = '#ffd700';
  ctx.strokeText('SCORE: ' + String(score).padStart(5, '0'), W / 2, cy + 50);
  ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), W / 2, cy + 50);

  if (score >= hiScore && score > 0) {
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.fillStyle = '#44ff44';
    ctx.strokeText('NEW HI-SCORE!', W / 2, cy + 85);
    ctx.fillText('NEW HI-SCORE!', W / 2, cy + 85);
  }

  const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.font = '14px "Press Start 2P", monospace';
  ctx.fillStyle = '#fff';
  ctx.strokeText('TAP TO CONTINUE', W / 2, cy + 130);
  ctx.fillText('TAP TO CONTINUE', W / 2, cy + 130);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawTable();
  drawObstacles();
  drawCollectibles();
  drawCat();
  drawParticles();
  drawScorePopups();
  drawHUD();
  if (state === STATE.MENU) drawMenu();
  if (state === STATE.GAMEOVER) drawGameOver();
}

function gameLoop() {
  update();
  draw();
  // Match page background to overlay state
  const isPlaying = state === STATE.PLAYING;
  document.body.style.background = '#fefe20';
  const bottomEl = document.getElementById('bottomBg');
  if (bottomEl) bottomEl.style.opacity = isPlaying ? '1' : '0.3';
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
